services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: notification_service_app
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        depends_on:
            - postgres
            - redis
            - rabbitmq
        networks:
            - notification_service_network

    nginx:
        image: nginx:1.27-alpine
        container_name: notification_service_nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - notification_service_network

    postgres:
        image: postgres:16-alpine
        container_name: notification_service_postgres
        ports:
            - "5433:5432"
        environment:
            POSTGRES_DB: notification_service
            POSTGRES_USER: notification_user
            POSTGRES_PASSWORD: notification_password
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - notification_service_network

    redis:
        image: redis:7-alpine
        container_name: notification_service_redis
        ports:
            - "6380:6379"
        networks:
            - notification_service_network

    rabbitmq:
        image: rabbitmq:3-management-alpine
        container_name: notification_service_rabbitmq
        ports:
            - "5673:5672"
            - "15673:15672"
        environment:
            RABBITMQ_DEFAULT_USER: notification_user
            RABBITMQ_DEFAULT_PASS: notification_password
        networks:
            - notification_service_network

networks:
    notification_service_network:
        driver: bridge

volumes:
    postgres_data:
